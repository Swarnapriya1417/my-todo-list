v<!DOCTYPE html>
<html>
<head>
  <title>To-Do List App</title>

  <style>
    body{
      font-family: Arial;
      text-align:center;
      background: lightblue;
      margin:0;
    }

    h1{
      color: darkblue;
      margin-top: 20px;
    }

    input{
      padding:10px;
      width:200px;
      border-radius:5px;
      border:1px solid #ccc;
    }

    button{
      padding:10px;
      background: darkblue;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:5px;
      margin-left:5px;
    }

    button:hover{
      background: navy;
    }

    ul{
      padding:0;
      margin-top:20px;
    }

    li{
      background:white;
      margin:10px auto;
      padding:10px;
      width:250px;
      list-style:none;
      display:flex;
      justify-content:space-between;
      border-radius:5px;
    }

    .delete{
      background:red;
      color:white;
      border:none;
      cursor:pointer;
      padding:5px;
      border-radius:3px;
    }
  </style>
</head>

<body>

  <h1>To-Do List App</h1>

  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>

  <script>
    function addTask(){
      let input = document.getElementById("taskInput");
      let task = input.value;

      if(task === ""){
        alert("Please enter a task");
        return;
      }

      let li = document.createElement("li");

      li.innerHTML = `
        ${task}
        <button class="delete" onclick="this.parentElement.remove()">X</button>
      `;

      document.getElementById("taskList").appendChild(li);

      input.value = "";
    }
  </script>

</body>
</html>
